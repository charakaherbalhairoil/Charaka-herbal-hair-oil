<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charaka Herbal Hair Oil</title>

  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- WHATSAPP FLOAT -->
<a class="whatsapp-float" href="https://wa.me/94715733633" target="_blank">💬 Order</a>

<!-- HERO SLIDER -->
<header class="hero">

  <div class="slide slide1 active"></div>
  <div class="slide slide2"></div>
  <div class="slide slide3"></div>

  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Charaka Herbal Hair Oil</h1>
    <p>Natural Growth • Strong Roots • No Chemicals</p>
    <a href="#order" class="btn primary">Order Now</a>
  </div>

</header>

<!-- FEATURES -->
<section class="features">
  <div class="feature-box">🌿 Herbal Formula</div>
  <div class="feature-box">💪 Stops Hair Fall</div>
  <div class="feature-box">✨ Natural Shine</div>
</section>

<!-- PRODUCT -->
<section class="product-section">
  <h2>Our Product</h2>

  <div class="product-card">
    <img src="images/product1.jpg">
    <h3>Herbal Hair Oil</h3>
    <p class="price">Rs. 1500</p>
  </div>
</section>

<!-- ORDER / PAYMENT SYSTEM -->
<section id="order" class="order-section">

  <h2>Order Now</h2>

  <form id="orderForm">

    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="address" placeholder="Address" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>

    <select id="payment">
      <option value="COD">Cash on Delivery</option>
      <option value="Bank">Bank Transfer</option>
    </select>

    <button type="submit">Place Order</button>

  </form>

  <p class="note">We will confirm your order on WhatsApp</p>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Charaka Herbal Hair Oil</p>
</footer>

<script src="script.js"></script>

</body>
</html>
