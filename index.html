<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charaka Herbal Hair Oil</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- WHATSAPP FLOAT -->
<a class="whatsapp-float" href="https://wa.me/94715733633" target="_blank">
  💬 Order
</a>

<!-- HERO SLIDER -->
<header class="hero">

  <div class="slide slide1 active"></div>
  <div class="slide slide2"></div>
  <div class="slide slide3"></div>

  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Charaka Herbal Hair Oil</h1>
    <p>Natural Growth • Strong Roots • No Chemicals</p>
  </div>

</header>

<!-- FEATURES -->
<section class="features">
  <div class="feature-box">🌿 Herbal Formula</div>
  <div class="feature-box">💪 Stops Hair Fall</div>
  <div class="feature-box">✨ Natural Shine</div>
</section>

<!-- PRODUCTS -->
<section class="product-section">

  <h2>Our Products</h2>

  <div class="product-card">
    <h3>Herbal Hair Oil</h3>
    <p>Rs. 1500</p>
    <button onclick="addCart('Herbal Hair Oil',1500)">Add to Cart</button>
  </div>

  <div class="product-card">
    <h3>Hair Growth Oil</h3>
    <p>Rs. 2000</p>
    <button onclick="addCart('Hair Growth Oil',2000)">Add to Cart</button>
  </div>

</section>

<!-- CART -->
<section class="cart-section">

  <h2>🛒 Cart</h2>

  <div id="cart"></div>

  <button class="checkout-btn" onclick="checkout()">Checkout via WhatsApp</button>

</section>

<!-- ORDER FORM (Firebase) -->
<section class="order-section">

  <h2>Quick Order</h2>

  <form id="orderForm">

    <input type="text" id="name" placeholder="Name" required>
    <input type="text" id="address" placeholder="Address" required>
    <input type="tel" id="phone" placeholder="Phone" required>

    <select id="payment">
      <option value="COD">Cash on Delivery</option>
      <option value="Bank">Bank Transfer</option>
    </select>

    <button type="submit">Place Order</button>

  </form>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Charaka Herbal Hair Oil</p>
</footer>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.addDoc = addDoc;
window.collection = collection;
</script>

<!-- MAIN SCRIPT -->
<script>

let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
  slides.forEach(s => s.classList.remove("active"));
  slides[index].classList.add("active");

  index++;
  if(index >= slides.length){
    index = 0;
  }
}, 3000);


// CART SYSTEM
let cart = [];

function addCart(name, price){
  cart.push({name,price});
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach((item)=>{
    total += item.price;
    html += `<p>${item.name} - Rs.${item.price}</p>`;
  });

  html += `<h3>Total: Rs.${total}</h3>`;
  document.getElementById("cart").innerHTML = html;
}

function checkout(){

  if(cart.length === 0){
    alert("Cart is empty!");
    return;
  }

  let msg = "🛒 Order List\n";

  cart.forEach(i=>{
    msg += `${i.name} - Rs.${i.price}\n`;
  });

  window.open(
    "https://wa.me/94715733633?text=" + encodeURIComponent(msg),
    "_blank"
  );
}


// FIREBASE ORDER FORM
document.getElementById("orderForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let phone = document.getElementById("phone").value;
  let payment = document.getElementById("payment").value;

  try {

    await addDoc(collection(db,"orders"),{
      name,
      address,
      phone,
      payment,
      time: new Date()
    });

    alert("Order Placed Successfully!");
    document.getElementById("orderForm").reset();

    window.open(
      "https://wa.me/94715733633?text=" +
      encodeURIComponent(`New Order\nName:${name}\nPhone:${phone}`),
      "_blank"
    );

  } catch(err){
    console.log(err);
    alert("Error placing order!");
  }
});

</script>

</body>
</html>
