<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Charaka Herbal Hair Oil</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- WHATSAPP FLOAT -->
<a class="whatsapp-float" href="https://wa.me/94715733633" target="_blank">
  💬 Order Now
</a>

<!-- HERO SLIDER -->
<header class="hero">

  <div class="slide slide1 active"></div>
  <div class="slide slide2"></div>
  <div class="slide slide3"></div>

  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Charaka Herbal Hair Oil</h1>
    <p>Natural Growth • Strong Roots • No Chemicals</p>
    <a href="#order" class="btn primary">Place Order</a>
  </div>

</header>

<!-- FEATURES -->
<section class="features">
  <div class="feature-box">🌿 Herbal Formula</div>
  <div class="feature-box">💪 Stops Hair Fall</div>
  <div class="feature-box">✨ Natural Shine</div>
</section>

<!-- PRODUCT -->
<section class="product-section">
  <h2>Our Product</h2>

  <div class="product-card">
    <img src="images/product1.jpg" alt="product">
    <h3>Herbal Hair Oil</h3>
    <p class="price">Rs. 1500</p>
  </div>
</section>

<!-- ORDER FORM -->
<section id="order" class="order-section">

  <h2>Place Your Order</h2>

  <form id="orderForm">

    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="address" placeholder="Address" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>

    <select id="payment">
      <option value="COD">Cash on Delivery</option>
      <option value="Bank">Bank Transfer</option>
    </select>

    <button type="submit">Place Order</button>

  </form>

  <p class="note">We will confirm your order via WhatsApp</p>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Charaka Herbal Hair Oil</p>
</footer>

<!-- FIREBASE v9 (FIXED) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // 🔥 YOUR FIREBASE CONFIG (replace this)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // SLIDER
  let slides = document.querySelectorAll(".slide");
  let index = 0;

  setInterval(() => {
    slides.forEach(s => s.classList.remove("active"));
    slides[index].classList.add("active");

    index++;
    if(index >= slides.length){
      index = 0;
    }
  }, 3000);

  // ORDER FORM
  document.getElementById("orderForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    let name = document.getElementById("name").value;
    let address = document.getElementById("address").value;
    let phone = document.getElementById("phone").value;
    let payment = document.getElementById("payment").value;

    try {
      await addDoc(collection(db, "orders"), {
        name,
        address,
        phone,
        payment,
        time: new Date()
      });

      alert("Order placed successfully!");

      // WhatsApp backup
      let msg =
`New Order 🛒
Name: ${name}
Phone: ${phone}
Address: ${address}
Payment: ${payment}`;

      window.open(
        "https://wa.me/94715733633?text=" + encodeURIComponent(msg),
        "_blank"
      );

      document.getElementById("orderForm").reset();

    } catch (err) {
      console.log(err);
      alert("Order failed. Check Firebase config.");
    }
  });

</script>

</body>
</html>
